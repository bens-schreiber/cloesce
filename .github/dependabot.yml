version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/src/compiler"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/src/runtime/ts"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/tests/regression"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/tests/e2e"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
