name: Publish from GitHub Release

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Set Cargo version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i.bak "s/^version = .*/version = \"$VERSION\"/" src/compiler/cli/Cargo.toml
          rm -f src/compiler/cli/Cargo.toml.bak
          cargo update --manifest-path src/compiler/cli/Cargo.toml --package cli

      - name: Build and package
        run: make build-cross package-cross TARGET=${{ matrix.target }} USE_CROSS=${{ matrix.use_cross && '1' || '0' }}

      - name: Upload tar.gz to release
        if: matrix.os != 'windows-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} dist/*.tar.gz --clobber

      - name: Upload zip to release
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} dist/*.zip --clobber
