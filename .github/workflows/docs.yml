name: Deploy docs
on: [workflow_dispatch]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Build mdBook and Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      
      - name: Cache mdBook binaries
        uses: actions/cache@v5
        id: cache-mdbook
        with:
          path: |
            ~/.cargo/bin/mdbook
          key: ${{ runner.os }}-mdbook-bins
      
      - name: Install mdBook and plugins
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: |
          cargo install mdbook --locked

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      
      - name: Build mdBook
        run: make build-docs

      - name: Patch mdBook TOC links
        run: |
          find docs/book -name 'toc*.js' -print0 \
            | xargs -0 sed -i 's@if (link.href === current_page@if (link.href.replace(/\.html$/, "") === current_page.replace(/\.html$/, "")@g'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/book --project-name=cloesce --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}