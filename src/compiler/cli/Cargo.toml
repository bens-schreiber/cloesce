[package]
name = "cli"
version = "0.0.1"
edition = "2024"

[dependencies]
ast = { path = "../ast" }
ariadne = "0.6.0"
clap = { version = "4.5.60", features = ["derive"] }
codegen = { path = "../codegen" }
frontend = { path = "../frontend" }
semantic = { path = "../semantic" }
tracing-subscriber = "0.3.22"
tracing = { workspace = true }

[[bin]]
name = "compile"
path = "bin/compile.rs"

[[bin]]
name = "migrate"
path = "bin/migrate.rs"
